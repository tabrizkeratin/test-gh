name: Download URL(s) with direct & YouTube support

on:
  workflow_dispatch:
    inputs:
      download_type:
        description: "Type of download"
        required: true
        default: "url"
        type: choice
        options:
          - url
          - mhtml
          - googleplay
      urls:
        description: "URLs (space or comma separated) – required for type=url / type=mhtml"
        required: false
      package_name:
        description: "Google Play package name – required for type=googleplay"
        required: false
      architecture:
        description: "Target architecture (googleplay)"
        required: false
        default: "arm64"
        type: choice
        options: ["arm64", "armv7"]
      merge_splits:
        description: "Merge split APKs (googleplay)"
        required: false
        type: boolean
        default: true
      title:
        description: "Optional title for MHTML file (no spaces/special chars)"
        required: false
      mode:
        description: "Mode: auto (smart zip), download-full (no zip), download-zip (force zip)"
        default: "auto"
      split_size_mb:
        description: "Split files larger than this MB (0 = never split)"
        default: "90"
      token:
        description: "Download token (matches repository secret)"
        required: true
      # YouTube-specific inputs (only used when download_type == 'url' and URL is YouTube)
      yt_format_spec:
        description: "yt-dlp format specifier"
        default: "bestvideo+bestaudio"
        required: false
      yt_extract_audio:
        description: "Extract audio only (true/false)"
        default: "false"
      yt_audio_format:
        description: "Audio container when extracting audio"
        default: "mp3"
      yt_subs:
        description: "Subtitle languages (comma‑separated)"
        default: ""
      yt_embed_subs:
        description: "Embed subtitles into file"
        default: "false"
      yt_embed_thumbnail:
        description: "Embed thumbnail"
        default: "false"
      yt_remux:
        description: "Remux video for better compatibility"
        default: "false"

concurrency:
  group: download-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      token_valid: ${{ steps.check_token.outputs.valid }}
    steps:
      - name: Validate download token
        id: check_token
        run: |
          if [[ "${{ github.event.inputs.token }}" == "${{ secrets.DOWNLOAD_TOKEN }}" ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  download:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.token_valid == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create work directory
        run: mkdir -p work
      
      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/*.py 2>/dev/null || true

      - name: Install common tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq ffmpeg aria2 curl git python3 python3-pip unzip

      # ------------------------------------------------------------
      # Prepare URL list (only for type=url)
      # ------------------------------------------------------------
      - name: Prepare URL list
        id: url_prep
        if: github.event.inputs.download_type == 'url'
        run: |
          INPUT_URLS="${{ github.event.inputs.urls }}"
          URLS=$(echo "$INPUT_URLS" | tr ',' ' ' | xargs -n1 | sort -u)
          echo "urls<<EOF" >> $GITHUB_OUTPUT
          echo "$URLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # TYPE: URL (YouTube or direct)
      # ------------------------------------------------------------
      - name: Install yt-dlp & bun (for YouTube)
        if: github.event.inputs.download_type == 'url'
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Prepare cookies (if secret exists)
        if: github.event.inputs.download_type == 'url'
        id: cookies
        env:
          COOKIES_TXT: ${{ secrets.YT_COOKIES }}
        run: |
          if [[ -n "$COOKIES_TXT" ]]; then
            echo "$COOKIES_TXT" > work/cookies.txt
            echo "cookie_file=work/cookies.txt" >> $GITHUB_OUTPUT
          else
            echo "cookie_file=" >> $GITHUB_OUTPUT
          fi

      - name: Download URLs
        if: github.event.inputs.download_type == 'url'
        run: |
          cd work
          ${{ github.workspace }}/scripts/download_urls.sh \
            --urls ${{ steps.url_prep.outputs.urls }} \
            --format-spec "${{ github.event.inputs.yt_format_spec }}" \
            --extract-audio "${{ github.event.inputs.yt_extract_audio }}" \
            --audio-format "${{ github.event.inputs.yt_audio_format }}" \
            --subs "${{ github.event.inputs.yt_subs }}" \
            --embed-subs "${{ github.event.inputs.yt_embed_subs }}" \
            --embed-thumbnail "${{ github.event.inputs.yt_embed_thumbnail }}" \
            --remux "${{ github.event.inputs.yt_remux }}" \
            ${COOKIES_ARG}

      - name: Install pyppeteer
        if: github.event.inputs.download_type == 'mhtml'
        run: python3 -m pip install pyppeteer

      - name: Download MHTML
        if: github.event.inputs.download_type == 'mhtml'
        run: |
          cd work
          python3 ${{ github.workspace }}/scripts/save_mhtml.py \
            "${{ github.event.inputs.urls }}" \
            "${{ github.event.inputs.title }}"

      # ------------------------------------------------------------
      # TYPE: Google Play APK
      # ------------------------------------------------------------
      - name: Download APK from Google Play (into work/)
        if: github.event.inputs.download_type == 'googleplay'
        run: |
          ${{ github.workspace }}/scripts/download_googleplay.sh \
            --package "${{ github.event.inputs.package_name }}" \
            --arch "${{ github.event.inputs.architecture }}" \
            --merge "${{ github.event.inputs.merge_splits }}" \
            --output "${{ github.workspace }}/work"

      # ------------------------------------------------------------
      # Upload the entire work/ directory
      # ------------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-files
          path: work/
          retention-days: 1

  finalize:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create timestamped subdirectory
        id: timestamp
        run: |
          TS=$(date +'%Y%m%d_%H%M%S')
          echo "subdir=downloads/$TS" >> $GITHUB_OUTPUT
          mkdir -p "downloads/$TS"

      - name: Move files to timestamped subdirectory
        run: |
          TARGET="${{ steps.timestamp.outputs.subdir }}"
          find artifacts -type f -exec cp {} "$TARGET/" \;
          if [ -z "$(ls -A "$TARGET" 2>/dev/null)" ]; then
            touch "$TARGET/.placeholder"
          fi

      - name: Split large files (if split_size_mb > 0)
        if: github.event.inputs.split_size_mb != '0'
        run: |
          SPLIT_SIZE=${{ github.event.inputs.split_size_mb }}
          TARGET="${{ steps.timestamp.outputs.subdir }}"
          cd "$TARGET"
          if [[ -f ".placeholder" ]]; then
            echo "No files to split."
            exit 0
          fi
          for f in *; do
            if [[ -f "$f" ]] && [[ $(stat -c%s "$f") -gt $((SPLIT_SIZE * 1048576)) ]]; then
              split -b ${SPLIT_SIZE}M "$f" "${f}.part."
              rm "$f"
            fi
          done

      - name: Zip files if appropriate
        if: github.event.inputs.mode == 'download-zip' || (github.event.inputs.mode == 'auto' && needs.download.result == 'success')
        run: |
          TARGET="${{ steps.timestamp.outputs.subdir }}"
          cd "$TARGET"
          if ls *.part.* 1> /dev/null 2>&1; then
            echo "Split parts detected. Not zipping."
            exit 0
          fi
          file_count=$(find . -maxdepth 1 -type f ! -name ".placeholder" | wc -l)
          total_size=$(du -sb . | cut -f1)
          if [[ "${{ github.event.inputs.mode }}" == "auto" && $file_count -le 1 ]]; then
            echo "Only one file in auto mode – skipping zip."
            exit 0
          fi
          if [[ $total_size -gt 104857600 ]]; then
            echo "Total size exceeds 100MB. Skipping zip."
            exit 0
          fi
          echo "Zipping $file_count files (total ${total_size} bytes)"
          zip -r all-files.zip .
          find . -type f ! -name "all-files.zip" ! -name ".placeholder" -delete

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP="${{ steps.timestamp.outputs.subdir }}"
          git add downloads/
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files from run at ${TIMESTAMP#downloads/} [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
