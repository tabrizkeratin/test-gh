name: Download YouTube URLs

on:
  workflow_dispatch:
    inputs:
      download_type:
        description: "Type of download"
        required: true
        default: "url"
        type: choice
        options:
          - url # single video or a list of video URLs
          - playlist_url # playlist page URL
          - mhtml # MHTML web archive
          - googleplay # Google Play APK
      urls:
        description: "URL(s) to download (one per line, comma‑ or newline‑separated)"
        required: false
        type: string
      package_name:
        description: "Google Play package name – required for type=googleplay"
        required: false
        type: string
      architecture:
        description: "Target architecture (googleplay)"
        required: false
        default: "arm64"
        type: choice
        options: ["arm64", "armv7"]
      merge_splits:
        description: "Merge split APKs (googleplay)"
        required: false
        type: boolean
        default: true
      title:
        description: "Optional title for MHTML file (no spaces/special chars)"
        required: false

      # --- YouTube options ---
      yt_format_spec:
        description: "yt‑dlp format specification (e.g. bestvideo[height<=1080]+bestaudio/best)"
        required: false
        type: string
        default: "bestvideo[height<=1080]+bestaudio/best[height<=1080]"
      yt_extract_audio:
        description: "Extract audio only (mp3)"
        type: boolean
        default: false
      yt_audio_format:
        description: "Audio format when extracting (mp3, m4a, etc.)"
        required: false
        type: string
        default: "mp3"
      yt_subs:
        description: "Download subtitles"
        type: boolean
        default: false
      yt_embed_subs:
        description: "Embed subtitles into the video"
        type: boolean
        default: false
      yt_embed_thumbnail:
        description: "Embed thumbnail"
        type: boolean
        default: false
      yt_remux:
        description: "Force remux to mp4"
        type: boolean
        default: false

      # --- new options ---
      playlist_items:
        description: "Playlist items (e.g. all, 3-7, 1,3,5) – leave empty for single video"
        required: false
        type: string
      download_subtitles:
        description: "Download subtitle files (separate from embedding)"
        type: boolean
        default: false
      subtitle_langs:
        description: "Subtitle language codes, comma‑separated (e.g. en,fa)"
        required: false
        type: string
        default: "en"
      embed_metadata:
        description: "Embed thumbnail + metadata into output file"
        type: boolean
        default: true
      embed_chapters:
        description: "Embed chapter markers"
        type: boolean
        default: true
      sponsorblock:
        description: "Skip sponsor/intro/outro/selfpromo segments via SponsorBlock"
        type: boolean
        default: false
      extra_args:
        description: "Additional yt‑dlp arguments (advanced users, will be appended last)"
        required: false
        type: string
      use_pot:
        description: "Use PO‑Token server to avoid bot detection (strongly recommended)"
        type: boolean
        default: true
      split_size_mb:
        description: "Split files larger than this size (MB, 0 to disable)"
        required: false
        type: number
        default: 0
      mode:
        description: "Output mode"
        required: false
        type: choice
        options:
          - download
          - download-zip
          - auto
        default: "auto"

permissions:
  contents: write

jobs:
  setup-and-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create work directory
        run: mkdir -p work

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh 2>/dev/null || true
          chmod +x scripts/*.py 2>/dev/null || true

      - name: Install common tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg zip jq curl git python3 python3-pip

      # ------------------------------------------------------------
      # PO‑Token server setup (only for YouTube)
      # ------------------------------------------------------------
      - name: Install PO‑Token server
        if: github.event.inputs.download_type == 'url' && github.event.inputs.use_pot == 'true'
        run: |
          pip install -q -U "yt-dlp[default]"
          git clone --depth 1 --branch 1.3.1 \
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git \
            /tmp/bgutil
          cd /tmp/bgutil/server && npm ci && npx tsc

      - name: Start PO Token provider server
        if: github.event.inputs.download_type == 'url' && github.event.inputs.use_pot == 'true'
        run: |
          node /tmp/bgutil/server/build/main.js &
          for i in {1..20}; do
            if curl -sf http://localhost:4416/status >/dev/null; then
              echo "PO Token server ready"
              break
            fi
            sleep 1
          done

      # ------------------------------------------------------------
      # TYPE: URL (YouTube or direct)
      # ------------------------------------------------------------
      - name: Prepare URLs
        id: url_prep
        if: github.event.inputs.download_type == 'url'
        run: |
          INPUT="${{ github.event.inputs.urls }}"
          CLEAN="$(echo "$INPUT" | tr '\n' ',' | sed 's/,\+/\,/g' | sed 's/^,\|,$//g')"
          echo "urls=$CLEAN" >> $GITHUB_OUTPUT

      - name: Prepare cookies
        id: cookies
        if: github.event.inputs.download_type == 'url'
        env:
          COOKIES_TXT: ${{ secrets.YT_COOKIES }}
        run: |
          if [[ -n "$COOKIES_TXT" ]]; then
            echo "$COOKIES_TXT" > work/cookies.txt
            echo "cookie_file=cookies.txt" >> $GITHUB_OUTPUT
          else
            echo "cookie_file=" >> $GITHUB_OUTPUT
          fi

      - name: Download URLs
        if: github.event.inputs.download_type == 'url'
        env:
          COOKIES_ARG: ${{ steps.cookies.outputs.cookie_file && format('--cookies {0}', steps.cookies.outputs.cookie_file) || '' }}
        run: |
          cd work
          ${{ github.workspace }}/scripts/download_urls.sh \
            --urls "${{ steps.url_prep.outputs.urls }}" \
            --format-spec "${{ github.event.inputs.yt_format_spec }}" \
            --extract-audio "${{ github.event.inputs.yt_extract_audio }}" \
            --audio-format "${{ github.event.inputs.yt_audio_format }}" \
            --subs "${{ github.event.inputs.yt_subs }}" \
            --embed-subs "${{ github.event.inputs.yt_embed_subs }}" \
            --embed-thumbnail "${{ github.event.inputs.yt_embed_thumbnail }}" \
            --remux "${{ github.event.inputs.yt_remux }}" \
            ${COOKIES_ARG} \
            --playlist-items "${{ github.event.inputs.playlist_items }}" \
            --download-subs "${{ github.event.inputs.download_subtitles }}" \
            --sub-langs "${{ github.event.inputs.subtitle_langs }}" \
            --embed-metadata "${{ github.event.inputs.embed_metadata }}" \
            --embed-chapters "${{ github.event.inputs.embed_chapters }}" \
            --sponsorblock "${{ github.event.inputs.sponsorblock }}" \
            --extra-args "${{ github.event.inputs.extra_args }}" \
            ${{ github.event.inputs.use_pot == 'true' && '--po-token' || '' }}

      # ------------------------------------------------------------
      # TYPE: MHTML
      # ------------------------------------------------------------
      - name: Install pyppeteer
        if: github.event.inputs.download_type == 'mhtml'
        run: python3 -m pip install pyppeteer

      - name: Download MHTML
        if: github.event.inputs.download_type == 'mhtml'
        run: |
          cd work
          python3 ${{ github.workspace }}/scripts/save_mhtml.py \
            "${{ github.event.inputs.urls }}" \
            "${{ github.event.inputs.title }}"

      # ------------------------------------------------------------
      # TYPE: Google Play
      # ------------------------------------------------------------
      - name: Download APK from Google Play
        if: github.event.inputs.download_type == 'googleplay'
        run: |
          ${{ github.workspace }}/scripts/download_googleplay.sh \
            --package "${{ github.event.inputs.package_name }}" \
            --arch "${{ github.event.inputs.architecture }}" \
            --merge "${{ github.event.inputs.merge_splits }}" \
            --output "${{ github.workspace }}/work"

  finalize:
    needs: setup-and-download
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create timestamped subdirectory
        id: timestamp
        run: |
          TS=$(date +'%Y%m%d_%H%M%S')
          echo "subdir=downloads/$TS" >> $GITHUB_OUTPUT
          mkdir -p "downloads/$TS"
      - name: Move files to timestamped subdirectory
        run: |
          TARGET="${{ steps.timestamp.outputs.subdir }}"
          find artifacts -type f -exec cp -t "$TARGET/" {} +
          if [ -z "$(ls -A "$TARGET" 2>/dev/null)" ]; then
            touch "$TARGET/.placeholder"
          fi
      - name: Split large files (if split_size_mb > 0)
        if: github.event.inputs.split_size_mb != '0'
        run: |
          SPLIT_SIZE=${{ github.event.inputs.split_size_mb }}
          TARGET="${{ steps.timestamp.outputs.subdir }}"
          cd "$TARGET"
          if [[ -f ".placeholder" ]]; then
            echo "No files to split."
            exit 0
          fi
          for f in *; do
            if [[ -f "$f" ]] && [[ $(stat -c%s "$f") -gt $((SPLIT_SIZE * 1048576)) ]]; then
              split -b ${SPLIT_SIZE}M "$f" "${f}.part."
              rm "$f"
            fi
          done
      - name: Zip files if appropriate
        if: github.event.inputs.mode == 'download-zip' || (github.event.inputs.mode == 'auto' && needs.download.result == 'success')
        run: |
          TARGET="${{ steps.timestamp.outputs.subdir }}"
          cd "$TARGET"
          if ls *.part.* 1> /dev/null 2>&1; then
            echo "Split parts detected. Not zipping."
            exit 0
          fi
          file_count=$(find . -maxdepth 1 -type f ! -name ".placeholder" | wc -l)
          total_size=$(du -sb . | cut -f1)
          if [[ "${{ github.event.inputs.mode }}" == "auto" && $file_count -le 1 ]]; then
            echo "Only one file in auto mode – skipping zip."
            exit 0
          fi
          if [[ $total_size -gt 104857600 ]]; then
            echo "Total size exceeds 100MB. Skipping zip."
            exit 0
          fi
          echo "Zipping $file_count files (total ${total_size} bytes)"
          zip -r all-files.zip .
          find . -type f ! -name "all-files.zip" ! -name ".placeholder" -delete
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP="${{ steps.timestamp.outputs.subdir }}"
          git add downloads/
          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files from run at ${TIMESTAMP#downloads/} [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
