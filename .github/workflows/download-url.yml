name: Download URL(s) with direct & YouTube support

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "URLs (space or comma separated)"
        required: true
      mode:
        description: "Mode: download (single) or download-zip (multiple)"
        default: "auto"
      split_size_mb:
        description: "Split files larger than this MB (0 = never split)"
        default: "90"
      token:
        description: "Download token (matches repository secret)"
        required: true
      # yt-dlp specific inputs (computed locally)
      yt_format_spec:
        description: "yt-dlp format specifier (e.g., bestvideo[height<=720]+bestaudio)"
        default: "bestvideo+bestaudio"
        required: false
      yt_extract_audio:
        description: "Extract audio only (true/false)"
        default: "false"
        required: false
      yt_audio_format:
        description: "Audio container when extracting audio (mp3, m4a, opus)"
        default: "mp3"
        required: false
      yt_subs:
        description: "Subtitle languages (comma‑separated, e.g., en,fr)"
        default: ""
        required: false
      yt_embed_subs:
        description: "Embed subtitles into file (true/false)"
        default: "false"
        required: false
      yt_embed_thumbnail:
        description: "Embed thumbnail (true/false)"
        default: "false"
        required: false
      yt_remux:
        description: "Remux video for better compatibility (true/false)"
        default: "false"
        required: false

concurrency:
  group: download-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      token_valid: ${{ steps.check_token.outputs.valid }}
    steps:
      - name: Validate download token
        id: check_token
        run: |
          if [[ "${{ github.event.inputs.token }}" == "${{ secrets.DOWNLOAD_TOKEN }}" ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "Invalid token" >&2
            exit 1
          fi

  setup-matrix:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.token_valid == 'true'
    outputs:
      urls_json: ${{ steps.prepare.outputs.urls_json }}
    steps:
      - name: Prepare URL matrix
        id: prepare
        run: |
          INPUT_URLS="${{ github.event.inputs.urls }}"
          # Replace commas with spaces and split
          URLS=$(echo "$INPUT_URLS" | tr ',' ' ' | xargs -n1 | sort -u)
          # Convert to JSON array
          JSON=$(echo "$URLS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "urls_json=$JSON" >> $GITHUB_OUTPUT

  download:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        url: ${{ fromJson(needs.setup-matrix.outputs.urls_json) }}
      fail-fast: false
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2 jq
          pip3 install --upgrade yt-dlp

      - name: Prepare cookies (if secret exists)
        id: cookies
        env:
          COOKIES_TXT: ${{ secrets.YT_COOKIES }}
        run: |
          if [[ -n "$COOKIES_TXT" ]]; then
            echo "$COOKIES_TXT" > cookies.txt
            echo "cookie_file=cookies.txt" >> $GITHUB_OUTPUT
          else
            echo "cookie_file=" >> $GITHUB_OUTPUT
          fi

      - name: Detect if YouTube
        id: detect
        run: |
          if echo "${{ matrix.url }}" | grep -Eq '(youtube\.com/watch\?v=|youtu\.be/)'; then
            echo "is_youtube=true" >> $GITHUB_OUTPUT
          else
            echo "is_youtube=false" >> $GITHUB_OUTPUT
          fi

      - name: Download with yt-dlp (YouTube)
        if: steps.detect.outputs.is_youtube == 'true'
        run: |
          # Build yt-dlp command
          CMD="yt-dlp --no-mtime --output '%(title)s.%(ext)s'"
          if [[ -n "${{ steps.cookies.outputs.cookie_file }}" ]]; then
            CMD="$CMD --cookies ${{ steps.cookies.outputs.cookie_file }}"
          fi
          CMD="$CMD -f '${{ github.event.inputs.yt_format_spec }}'"

          if [[ "${{ github.event.inputs.yt_extract_audio }}" == "true" ]]; then
            CMD="$CMD --extract-audio --audio-format ${{ github.event.inputs.yt_audio_format }}"
          fi

          if [[ -n "${{ github.event.inputs.yt_subs }}" ]]; then
            CMD="$CMD --write-subs --sub-langs ${{ github.event.inputs.yt_subs }}"
            if [[ "${{ github.event.inputs.yt_embed_subs }}" == "true" ]]; then
              CMD="$CMD --embed-subs"
            fi
          fi

          if [[ "${{ github.event.inputs.yt_embed_thumbnail }}" == "true" ]]; then
            CMD="$CMD --embed-thumbnail"
          fi

          echo "Running: $CMD ${{ matrix.url }}"
          eval $CMD "${{ matrix.url }}"

          # Optional remux
          if [[ "${{ github.event.inputs.yt_remux }}" == "true" ]]; then
            for f in *.mp4 *.webm *.mkv; do
              [ -f "$f" ] || continue
              echo "Remuxing $f ..."
              ffmpeg -i "$f" -c copy "fixed_$f" -y && mv "fixed_$f" "$f"
            done
          fi

          # Clean temporary files
          rm -f cookies.txt
          rm -f *.part

      - name: Download with aria2c (non-YouTube)
        if: steps.detect.outputs.is_youtube == 'false'
        run: |
          aria2c --max-connection-per-server=16 --split=16 --min-split-size=1M \
                 --console-log-level=error --summary-interval=0 \
                 --out="downloaded_file" "${{ matrix.url }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: download-${{ strategy.job-index }}
          path: |
            *
            !cookies.txt
          retention-days: 1

  finalize:
    needs: download
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move files to downloads/
        run: |
          mkdir -p downloads
          find artifacts -type f -exec cp {} downloads/ \;

      - name: Split large files (if split_size_mb > 0)
        if: github.event.inputs.split_size_mb != '0'
        run: |
          SPLIT_SIZE=${{ github.event.inputs.split_size_mb }}
          cd downloads
          for f in *; do
            if [[ -f "$f" ]] && [[ $(stat -c%s "$f") -gt $((SPLIT_SIZE * 1048576)) ]]; then
              echo "Splitting $f (size > ${SPLIT_SIZE}MB)"
              split -b ${SPLIT_SIZE}M "$f" "${f}.part."
              rm "$f"
            fi
          done

      - name: Zip all files if mode is download-zip
        if: github.event.inputs.mode == 'download-zip' || (github.event.inputs.mode == 'auto' && needs.download.result != 'skipped')
        run: |
          cd downloads
          zip -r all-files.zip .
          rm -rf *
          mv all-files.zip ../all-files.zip
          cd ..
          rm -rf downloads
          mkdir downloads
          mv all-files.zip downloads/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if ! git diff --cached --quiet; then
            git commit -m "${{ github.event.inputs.commit_msg || 'Add downloaded files' }} [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
