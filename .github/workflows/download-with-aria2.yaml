name: Download from Commit & Save to Repo

on:
  push:
    branches:
      - "**"

concurrency:
  group: download-${{ github.ref }}
  cancel-in-progress: true

jobs:
  save-file:
    if: ${{ (contains(github.event.head_commit.message, 'download:') || contains(github.event.head_commit.message, 'download-zip:')) && !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2

      - name: Download, process and split files
        shell: bash
        env:
          ALLOWED_DOMAINS: ${{ vars.ALLOWED_DOMAINS || '.*' }}
        run: |
          set -euo pipefail
          trap 'rm -rf tmp_downloads' EXIT

          LIMIT=$((90 * 1024 * 1024))

          # 1) Parse commit message
          MSG="$(git log -1 --pretty=%B)"
          echo "Commit message:"
          echo "$MSG"

          if echo "$MSG" | grep -qP 'download-zip:'; then
            MODE="zip"
            KEYWORD="download-zip"
          elif echo "$MSG" | grep -qP 'download:'; then
            MODE="normal"
            KEYWORD="download"
          else
            echo "❌ No download command found in commit message"
            exit 1
          fi
          echo "Mode: $MODE"

          # 2) Extract URLs
          KEYWORD_LINE_NUM=$(echo "$MSG" | grep -n -E "^.*${KEYWORD}:" | head -1 | cut -d: -f1)
          if [ -z "$KEYWORD_LINE_NUM" ]; then
            echo "❌ Keyword line not found"
            exit 1
          fi

          URL_BLOCK=$(echo "$MSG" | sed -n "${KEYWORD_LINE_NUM},\$p")
          FIRST_LINE_URLS=$(echo "$URL_BLOCK" | head -1 | sed -E "s/.*${KEYWORD}:\s*//")
          REST_LINES=$(echo "$URL_BLOCK" | tail -n +2 | grep -v '^\s*$' || true)
          ALL_URLS_STR="$FIRST_LINE_URLS $REST_LINES"

          # ---- new parser ----
          # 1. Replace commas with spaces (assumes commas are separators, not inside URLs)
          CLEAN=$(echo "$ALL_URLS_STR" | tr ',' ' ')
          # 2. Use xargs to split while respecting single/double quotes
          mapfile -t URLS < <(echo "$CLEAN" | xargs -n1)

          # Remove empty elements (just in case)
          URLS=("${URLS[@]}")
          # --------------------

          if [ ${#URLS[@]} -eq 0 ]; then
            echo "❌ No URLs extracted"
            exit 1
          fi
          echo "URLs to download: ${URLS[*]}"

          # 3) Domain allowlist check
          for URL in "${URLS[@]}"; do
            HOST=$(echo "$URL" | awk -F/ '{print $3}')
            if ! echo "$HOST" | grep -qP "$ALLOWED_DOMAINS"; then
              echo "❌ Host '$HOST' is not in the allowed domains"
              exit 1
            fi
          done
          echo "✅ All URLs pass the domain allowlist"

          # 4) Download files
          mkdir -p downloads tmp_downloads

          for URL in "${URLS[@]}"; do
            echo "⬇️  Downloading $URL"
            # use server-provided filename
            aria2c \
              --split=2 \
              --max-connection-per-server=2 \
              --min-split-size=90M \
              --content-disposition \
              --allow-overwrite=false \
              --auto-file-renaming=false \
              --dir="tmp_downloads" \
              "$URL"
          done

          # 5) If zip mode – archive everything, keep only the archive
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "tmp_downloads/$ARCHIVE_NAME" tmp_downloads/*
            find tmp_downloads -type f ! -name "$ARCHIVE_NAME" -delete
            echo "📦 Created $ARCHIVE_NAME"
          fi

          # 6) Move / split files, avoiding duplicates
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            BASENAME=$(basename "$FILE")
            SIZE=$(stat -c%s "$FILE")
            DEST="downloads/$BASENAME"

            # skip identical existing file
            if [ -f "$DEST" ] && cmp -s "$FILE" "$DEST"; then
              echo "⏭️  $BASENAME – identical file already exists, skipping"
              continue
            fi

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️  $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting"

              if [[ "$BASENAME" == *.zip ]]; then
                # already a zip – copy and split using --out
                cp "$FILE" "$DEST"
                # output base name without .zip extension
                SPLIT_BASE="downloads/${BASENAME%.zip}"
                zip -s 90m "$DEST" --out "$SPLIT_BASE"
                # the original DEST is now the last split part (.zip)
                echo "✅ Parts: $(ls ${SPLIT_BASE}.* | wc -l)"
              else
                # non‑zip: create a stored, split zip in one step
                ZIPNAME="${BASENAME}.zip"
                zip -0 -j -s 90m "downloads/$ZIPNAME" "$FILE"
                # this creates downloads/ZIPNAME (the last part) and .z01, .z02, ...
                echo "✅ Parts: $(ls downloads/${ZIPNAME}* | wc -l)"
              fi
            else
              cp "$FILE" "$DEST"
              echo "✅ Copied $BASENAME ($(( SIZE / 1024 ))KB)"
            fi
          done

      - name: Commit & Push
        if: success()
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -z "$(git status downloads/ --porcelain)" ]; then
            echo "Nothing to commit"
            exit 0
          fi

          git add downloads/
          git commit -m "Add downloaded files from commit [skip ci]"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin HEAD:$BRANCH
