name: Clean Downloads History

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show what would be removed)"
        required: false
        type: boolean
        default: true
      confirm:
        description: 'Type "YES" to really rewrite history'
        required: false
        type: string
        default: ""

jobs:
  clean:
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'YES' || inputs.dry_run == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: sudo apt-get update -qq && sudo apt-get install -y -qq git-filter-repo

      - name: Dry run or execute
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "=== DRY RUN ==="
            git filter-repo --path downloads/ --invert-paths --dry-run
            echo "=== END DRY RUN ==="
            echo "To really remove, dispatch with confirm='YES' and dry_run=false"
          else
            echo "=== EXECUTING CLEAN ==="
            git filter-repo --path downloads/ --invert-paths --force
            echo "Force pushing rewritten history..."
            git push --force --all
            git push --force --tags
            echo "=== CLEAN COMPLETE ==="
            echo "All collaborators must run: git fetch --prune && git reset --hard origin/main"
          fi
